<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <div class="calc-body">
        
        <input type="text" id="display" placeholder="0" readonly aria-label="Calculator display">
        
        <span id="error"></span>

        <div class="calculator-buttons-container">
            
            <div class="calc-row top-row">
                <button class="mem-btn">M+</button>
                <button class="mem-btn">M-</button>
                <button class="mem-btn">MRC</button>
                <button class="mem-btn">GT</button>
                <button class="ON" onclick="clearDisplay()">AC</button>
                <button class="OFF">OFF</button>
            </div>

            <div class="calc-row">
                <button onclick="append('7')">7</button>
                <button onclick="append('8')">8</button>
                <button onclick="append('9')">9</button>
                <button onclick="operation('/')">÷</button>
                <button onclick="special('sqrt')">√</button>
            </div>

            <div class="calc-row">
                <button onclick="append('4')">4</button>
                <button onclick="append('5')">5</button>
                <button onclick="append('6')">6</button>
                <button onclick="operation('*')">*</button>
                <button onclick="special('cubeRoot')">cube</button> 
            </div>

            <div class="calc-row">
                <button onclick="append('1')">1</button>
                <button onclick="append('2')">2</button>
                <button onclick="append('3')">3</button>
                <button onclick="operation('-')">-</button>
                <button onclick="special('square')">square</button>
            </div>

            <div class="calc-row">
                <button onclick="append('0')">0</button>
                <button onclick="append('.')">.</button>
                <button onclick="clearDisplay()">C</button>
                <button onclick="operation('+')">+</button>
                <button onclick="special('percent')">%</button>
                <button onclick="calculate()">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
